name: backend-ci

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - run: pip install -e ".[dev]"

      - run: ruff check .
      - run: black --check .
      - run: mypy app tests

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bookmarks
          POSTGRES_PASSWORD: bookmarks
          POSTGRES_DB: bookmarks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookmarks"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - run: pip install -e ".[dev]"

      # No DATABASE_URL/JWT_SECRET_KEY needed here - tests/conftest.py's
      # os.environ.setdefault(...) already matches this service's
      # credentials (user/password "bookmarks", db "bookmarks_test").
      - run: pytest --cov --cov-report=term-missing

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - run: pip install -e "." pip-audit
      # Only the runtime dependency tree - dev-only tooling (pytest, ruff,
      # etc.) never ships to Lambda, so a vulnerability there isn't a
      # production exposure worth failing the build over. Not --strict:
      # that also hard-fails on *unresolvable* packages, which includes
      # this project's own editable install (it isn't on PyPI) - not a
      # real vulnerability, just noise.
      - run: pip-audit
