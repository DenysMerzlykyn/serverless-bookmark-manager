# Dummy, throwaway values for an ephemeral kind cluster that's torn down at
# the end of every CI run - not real secrets, never used against a real
# database. Committing them plainly (rather than via a K8s secret generator
# or sealed-secrets) is deliberate: there's nothing here worth protecting.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
stringData:
  POSTGRES_USER: bookmarks
  POSTGRES_PASSWORD: bookmarks
  POSTGRES_DB: bookmarks
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://bookmarks:bookmarks@postgres:5432/bookmarks
  JWT_SECRET_KEY: kind-demo-not-a-real-secret-do-not-reuse
