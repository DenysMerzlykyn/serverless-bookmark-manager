# Local-only Postgres for development and integration tests. Not used in
# production — prod/dev environments both run against Neon (see ARCHITECTURE.md).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookmarks
      POSTGRES_PASSWORD: bookmarks
      POSTGRES_DB: bookmarks
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookmarks"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - bookmarks-postgres-data:/var/lib/postgresql/data

volumes:
  bookmarks-postgres-data:
